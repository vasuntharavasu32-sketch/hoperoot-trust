backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "_projects"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Education", "Healthcare", "Environment", "Disaster Relief"] }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Goal Amount (₹)", name: "goal", widget: "number" }
      - { label: "Raised Amount (₹)", name: "raised", widget: "number" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Active", name: "active", widget: "boolean", default: true }
